{% extends "base.html" %}
{% block title %}New Sales Order{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <h2><i class="bi bi-file-earmark-plus"></i> New Sales Order</h2>
    
    <div class="card mt-3">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Customer <span class="text-danger">*</span></label>
                            <select class="form-select" name="customer_id" required>
                                <option value="">Select Customer</option>
                                {% for customer in customers %}
                                <option value="{{ customer.id }}">{{ customer.customer_number }} - {{ customer.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Sales Type <span class="text-danger">*</span></label>
                            <select class="form-select" name="sales_type" id="sales_type" required>
                                <option value="">Select Type</option>
                                <option value="Outright Sale">Outright Sale</option>
                                <option value="Exchange">Exchange</option>
                                <option value="Managed Repair">Managed Repair</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="row" id="exchange_type_section" style="display: none;">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Exchange Type</label>
                            <select class="form-select" name="exchange_type" id="exchange_type">
                                <option value="">Select Exchange Type</option>
                                <option value="Single Exchange">Single Exchange</option>
                                <option value="Dual Exchange">Dual Exchange</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label class="form-label">Order Date</label>
                            <input type="date" class="form-control" name="order_date" id="order_date" value="{{ request.form.get('order_date', '') }}">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label class="form-label">Expected Ship Date</label>
                            <input type="date" class="form-control" name="expected_ship_date">
                        </div>
                    </div>
                    <div class="col-md-3" id="core_due_days_section" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label">Core Due Days <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" name="core_due_days" id="core_due_days" 
                                   min="0" max="365" placeholder="e.g., 30">
                            <small class="text-muted">Number of days the customer has to return the core unit.</small>
                        </div>
                    </div>
                    <div class="col-md-3" id="exchange_return_date_section" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label">Expected Core Return Date <i class="bi bi-lock text-muted" title="Calculated automatically based on Order Date + Core Due Days"></i></label>
                            <input type="date" class="form-control bg-light" id="expected_return_date_display" readonly>
                            <input type="hidden" name="expected_return_date" id="expected_return_date">
                            <small class="text-muted">Auto-calculated from Order Date + Core Due Days</small>
                        </div>
                    </div>
                    <div class="col-md-3" id="repair_return_date_section" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label">Expected Return Date</label>
                            <input type="date" class="form-control" name="expected_return_date" id="repair_expected_return_date">
                        </div>
                    </div>
                </div>

                <div class="mb-3" id="service_notes_section" style="display: none;">
                    <label class="form-label">Service Notes</label>
                    <textarea class="form-control" name="service_notes" rows="2"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Notes</label>
                    <textarea class="form-control" name="notes" rows="3"></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="{{ url_for('salesorder_routes.list_sales_orders') }}" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> Create Sales Order
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('sales_type').addEventListener('change', function() {
    const type = this.value;
    const serviceNotesSection = document.getElementById('service_notes_section');
    const exchangeTypeSection = document.getElementById('exchange_type_section');
    const coreDueDaysSection = document.getElementById('core_due_days_section');
    const exchangeReturnDateSection = document.getElementById('exchange_return_date_section');
    const repairReturnDateSection = document.getElementById('repair_return_date_section');
    const coreDueDaysInput = document.getElementById('core_due_days');
    
    // Hide all conditional sections first
    coreDueDaysSection.style.display = 'none';
    exchangeReturnDateSection.style.display = 'none';
    repairReturnDateSection.style.display = 'none';
    serviceNotesSection.style.display = 'none';
    exchangeTypeSection.style.display = 'none';
    coreDueDaysInput.required = false;
    
    if (type === 'Exchange') {
        exchangeTypeSection.style.display = 'flex';
        coreDueDaysSection.style.display = 'block';
        exchangeReturnDateSection.style.display = 'block';
        serviceNotesSection.style.display = 'block';
        coreDueDaysInput.required = true;
    } else if (type === 'Managed Repair') {
        repairReturnDateSection.style.display = 'block';
        serviceNotesSection.style.display = 'block';
    }
    
    // Clear Exchange-specific fields when switching away
    if (type !== 'Exchange') {
        coreDueDaysInput.value = '';
        document.getElementById('expected_return_date').value = '';
        document.getElementById('expected_return_date_display').value = '';
    }
});

function calculateExpectedReturnDate() {
    const orderDateInput = document.getElementById('order_date');
    const coreDueDaysInput = document.getElementById('core_due_days');
    const expectedReturnDateInput = document.getElementById('expected_return_date');
    const expectedReturnDateDisplay = document.getElementById('expected_return_date_display');
    const salesType = document.getElementById('sales_type').value;
    
    if (salesType !== 'Exchange') {
        expectedReturnDateInput.value = '';
        expectedReturnDateDisplay.value = '';
        return;
    }
    
    const orderDate = orderDateInput.value;
    const coreDueDays = parseInt(coreDueDaysInput.value);
    
    if (orderDate && !isNaN(coreDueDays) && coreDueDays >= 0) {
        const date = new Date(orderDate);
        date.setDate(date.getDate() + coreDueDays);
        const calculatedDate = date.toISOString().split('T')[0];
        expectedReturnDateInput.value = calculatedDate;
        expectedReturnDateDisplay.value = calculatedDate;
    } else {
        expectedReturnDateInput.value = '';
        expectedReturnDateDisplay.value = '';
    }
}

document.getElementById('order_date').addEventListener('change', calculateExpectedReturnDate);
document.getElementById('core_due_days').addEventListener('input', calculateExpectedReturnDate);
</script>
{% endblock %}
