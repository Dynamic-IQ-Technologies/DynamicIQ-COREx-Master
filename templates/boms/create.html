{% extends "base.html" %}

{% block title %}Create BOM - MRP System{% endblock %}

{% block content %}
<h2 class="mb-4">Create Bill of Materials</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="parent_product_id" class="form-label">Parent Product (Assembly) *</label>
                <select class="form-select" id="parent_product_id" name="parent_product_id" required>
                    <option value="">Select Parent Product</option>
                    {% for product in products %}
                    <option value="{{ product.id }}">{{ product.code }} - {{ product.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="child_product_id" class="form-label">Child Product (Component) *</label>
                <select class="form-select" id="child_product_id" name="child_product_id" required>
                    <option value="">Select Child Product</option>
                    {% for product in products %}
                    <option value="{{ product.id }}">{{ product.code }} - {{ product.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="quantity" class="form-label">Quantity Required *</label>
                        <input type="number" step="0.01" class="form-control" id="quantity" name="quantity" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="scrap_percentage" class="form-label">Scrap Percentage</label>
                        <input type="number" step="0.01" class="form-control" id="scrap_percentage" name="scrap_percentage" value="0">
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('bom_routes.list_boms') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Create BOM</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
