<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Submitted Successfully</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card text-center">
                    <div class="card-body py-5">
                        <div class="mb-4">
                            <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
                        </div>
                        <h3 class="mb-3">Quote Submitted Successfully!</h3>
                        <p class="text-muted mb-4">
                            Thank you for submitting your quote for RFQ
                            {% if token_data %}<strong>{{ token_data.rfq_number }}</strong>{% endif %}.
                        </p>
                        <p class="small text-muted">
                            Your quote has been received and will be reviewed by the procurement team.
                            You will be contacted if your quote is selected.
                        </p>
                        <hr>
                        <p class="small text-muted mb-0">
                            <i class="bi bi-clock me-1"></i>
                            Thank you for your submission.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
