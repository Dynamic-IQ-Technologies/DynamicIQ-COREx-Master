{% extends "base.html" %}

{% block title %}Add Skillset - Dynamic.IQ.MRP{% endblock %}

{% block content %}
<div class="mb-3">
    <a href="{{ url_for('skillset_routes.list_skillsets') }}" class="btn btn-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back to Skillsets</a>
</div>

<h2>Add Skillset</h2>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('skillset_routes.create_skillset') }}">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="skillset_name" class="form-label">Skillset Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="skillset_name" name="skillset_name" required placeholder="e.g., Welding, CNC Machining">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select" id="category" name="category">
                            <option value="">- Select Category -</option>
                            <option value="Technical">Technical</option>
                            <option value="Safety">Safety</option>
                            <option value="Administrative">Administrative</option>
                            <option value="Quality">Quality</option>
                            <option value="Leadership">Leadership</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3" placeholder="Brief description of this skillset"></textarea>
            </div>

            <div class="mb-3">
                <label for="status" class="form-label">Status</label>
                <select class="form-select" id="status" name="status">
                    <option value="Active" selected>Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('skillset_routes.list_skillsets') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Create Skillset</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
