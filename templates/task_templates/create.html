{% extends "base.html" %}

{% block title %}Create Task Template - Dynamic.IQ.MRP{% endblock %}

{% block content %}
<div class="mb-3">
    <a href="{{ url_for('task_template_routes.list_templates') }}" class="btn btn-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back to Templates</a>
</div>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-plus-circle"></i> Create Task Template</h2>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-8">
                    <div class="mb-3">
                        <label for="template_name" class="form-label">Template Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="template_name" name="template_name" required>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select" id="category" name="category">
                            {% for cat in categories %}
                            <option value="{{ cat }}">{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3"></textarea>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Create Template</button>
                <a href="{{ url_for('task_template_routes.list_templates') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<div class="alert alert-info mt-4">
    <i class="bi bi-info-circle"></i> After creating the template, you'll be able to add task items to it.
</div>
{% endblock %}
