{% extends "base.html" %}

{% block title %}Create Training Record - QMS{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h2 mb-1"><i class="bi bi-mortarboard me-2"></i>Create Training Record</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="{{ url_for('qms.dashboard') }}">QMS</a></li>
                    <li class="breadcrumb-item"><a href="{{ url_for('qms.training_list') }}">Training</a></li>
                    <li class="breadcrumb-item active">Create</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label">Employee <span class="text-danger">*</span></label>
                            <select name="user_id" class="form-select" required>
                                <option value="">Select Employee</option>
                                {% for user in users %}
                                <option value="{{ user.id }}">{{ user.full_name or user.username }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Document Type <span class="text-danger">*</span></label>
                                <select name="document_type" class="form-select" required id="documentType">
                                    <option value="SOP">SOP</option>
                                    <option value="WorkInstruction">Work Instruction</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Document <span class="text-danger">*</span></label>
                                <select name="document_id" class="form-select" required id="documentSelect">
                                    {% for sop in sops %}
                                    <option value="{{ sop.id }}" data-type="SOP">{{ sop.sop_number }} - {{ sop.title }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Training Type</label>
                                <select name="training_type" class="form-select">
                                    <option value="Initial">Initial</option>
                                    <option value="Refresher">Refresher</option>
                                    <option value="Recertification">Recertification</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Training Date <span class="text-danger">*</span></label>
                                <input type="date" name="training_date" class="form-control" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Trainer</label>
                                <select name="trainer_id" class="form-select">
                                    <option value="">No Trainer</option>
                                    {% for user in users %}
                                    <option value="{{ user.id }}">{{ user.full_name or user.username }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Score (%)</label>
                                <input type="number" name="score" class="form-control" min="0" max="100">
                            </div>
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input type="checkbox" name="passed" class="form-check-input" id="passed" checked>
                                <label class="form-check-label" for="passed">Passed</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Notes</label>
                            <textarea name="notes" class="form-control" rows="2"></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-lg me-1"></i> Create Training Record
                            </button>
                            <a href="{{ url_for('qms.training_list') }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const sops = {{ sops|tojson }};
const wis = {{ wis|tojson }};

document.getElementById('documentType').addEventListener('change', function() {
    const select = document.getElementById('documentSelect');
    select.innerHTML = '';
    
    const docs = this.value === 'SOP' ? sops : wis;
    const prefix = this.value === 'SOP' ? 'sop_number' : 'wi_number';
    
    docs.forEach(doc => {
        const option = document.createElement('option');
        option.value = doc.id;
        option.textContent = (doc.sop_number || doc.wi_number) + ' - ' + doc.title;
        select.appendChild(option);
    });
});
</script>
{% endblock %}
