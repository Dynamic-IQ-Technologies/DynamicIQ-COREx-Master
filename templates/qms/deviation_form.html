{% extends "base.html" %}

{% block title %}Report Deviation - QMS - Dynamic.IQ-MRPx{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h2 mb-1"><i class="bi bi-exclamation-triangle me-2"></i>Report Deviation</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="{{ url_for('qms.dashboard') }}">QMS</a></li>
                    <li class="breadcrumb-item"><a href="{{ url_for('qms.deviation_list') }}">Deviations</a></li>
                    <li class="breadcrumb-item active">Report</li>
                </ol>
            </nav>
        </div>
    </div>

    <form method="post">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-transparent">
                        <h5 class="mb-0">Deviation Details</h5>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Deviation Type <span class="text-danger">*</span></label>
                                <select name="deviation_type" class="form-select" required>
                                    <option value="">Select Type</option>
                                    {% for dtype in deviation_types %}
                                    <option value="{{ dtype }}">{{ dtype }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Severity <span class="text-danger">*</span></label>
                                <select name="severity" class="form-select" required>
                                    <option value="Minor">Minor</option>
                                    <option value="Major">Major</option>
                                    <option value="Critical">Critical</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description <span class="text-danger">*</span></label>
                            <textarea name="description" class="form-control" rows="4" required placeholder="Describe the deviation in detail..."></textarea>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Related SOP</label>
                                <select name="sop_id" class="form-select">
                                    <option value="">None</option>
                                    {% for sop in sops %}
                                    <option value="{{ sop.id }}">{{ sop.sop_number }} - {{ sop.title }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Related Work Instruction</label>
                                <select name="work_instruction_id" class="form-select">
                                    <option value="">None</option>
                                    {% for wi in wis %}
                                    <option value="{{ wi.id }}">{{ wi.wi_number }} - {{ wi.title }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">ERP Module</label>
                                <input type="text" name="erp_module" class="form-control" placeholder="e.g., Work Orders, Inventory...">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">ERP Transaction ID</label>
                                <input type="text" name="erp_transaction_id" class="form-control" placeholder="e.g., WO-0001, PO-0005...">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Root Cause (if known)</label>
                            <textarea name="root_cause" class="form-control" rows="2" placeholder="Initial root cause analysis..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Immediate Action Taken</label>
                            <textarea name="immediate_action" class="form-control" rows="2" placeholder="Describe any immediate corrective action..."></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-transparent">
                        <h5 class="mb-0">Assignment</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Assign To</label>
                            <select name="assigned_to" class="form-select">
                                <option value="">Unassigned</option>
                                {% for user in users %}
                                <option value="{{ user.id }}">{{ user.full_name or user.username }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Due Date</label>
                            <input type="date" name="due_date" class="form-control">
                        </div>

                        <div class="form-check">
                            <input type="checkbox" name="capa_required" class="form-check-input" id="capaRequired">
                            <label class="form-check-label" for="capaRequired">CAPA Required</label>
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-warning btn-lg">
                        <i class="bi bi-exclamation-triangle me-1"></i> Report Deviation
                    </button>
                    <a href="{{ url_for('qms.deviation_list') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </div>
        </div>
    </form>
</div>
{% endblock %}
