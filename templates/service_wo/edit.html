{% extends "base.html" %}

{% block title %}Edit Service Work Order {{ swo.swo_number }} - Dynamic.IQ.MRP{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="mb-4">
        <h2><i class="bi bi-wrench-adjustable"></i> Edit Service Work Order: {{ swo.swo_number }}</h2>
    </div>

    <form method="POST">
        <div class="row">
            <!-- Left Column -->
            <div class="col-md-6">
                <div class="card mb-3">
                    <div class="card-header">
                        <h5>Service Details</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Service Type <span class="text-danger">*</span></label>
                            <select name="service_type" class="form-select" required>
                                <option value="">Select Type</option>
                                <option value="Service" {% if swo.service_type == 'Service' %}selected{% endif %}>Service</option>
                                <option value="NDT" {% if swo.service_type == 'NDT' %}selected{% endif %}>NDT (Non-Destructive Testing)</option>
                                <option value="Repair" {% if swo.service_type == 'Repair' %}selected{% endif %}>Repair</option>
                                <option value="Maintenance" {% if swo.service_type == 'Maintenance' %}selected{% endif %}>Maintenance</option>
                                <option value="Inspection" {% if swo.service_type == 'Inspection' %}selected{% endif %}>Inspection</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Priority</label>
                            <select name="priority" class="form-select">
                                <option value="Low" {% if swo.priority == 'Low' %}selected{% endif %}>Low</option>
                                <option value="Medium" {% if swo.priority == 'Medium' %}selected{% endif %}>Medium</option>
                                <option value="High" {% if swo.priority == 'High' %}selected{% endif %}>High</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Due Date</label>
                            <input type="date" name="due_date" class="form-control" value="{{ swo.due_date or '' }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Assigned To</label>
                            <select name="assigned_to" class="form-select">
                                <option value="">Unassigned</option>
                                {% for emp in employees %}
                                <option value="{{ emp.id }}" {% if swo.assigned_to == emp.id %}selected{% endif %}>
                                    {{ emp.first_name }} {{ emp.last_name }} ({{ emp.employee_code }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" name="location" class="form-control" placeholder="Service location" 
                                   value="{{ swo.location or '' }}">
                        </div>
                    </div>
                </div>

                <div class="card mb-3">
                    <div class="card-header">
                        <h5>Customer Information</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Customer</label>
                            <select name="customer_id" class="form-select">
                                <option value="">Select Customer</option>
                                {% for customer in customers %}
                                <option value="{{ customer.id }}" {% if swo.customer_id == customer.id %}selected{% endif %}>
                                    {{ customer.customer_number }} - {{ customer.company_name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column -->
            <div class="col-md-6">
                <div class="card mb-3">
                    <div class="card-header">
                        <h5>Equipment Details</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Equipment Description</label>
                            <textarea name="equipment_description" class="form-control" rows="2" 
                                      placeholder="Description of equipment to be serviced">{{ swo.equipment_description or '' }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Equipment Serial Number</label>
                            <input type="text" name="equipment_serial" class="form-control" placeholder="Serial number"
                                   value="{{ swo.equipment_serial or '' }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Equipment Model</label>
                            <input type="text" name="equipment_model" class="form-control" placeholder="Model number"
                                   value="{{ swo.equipment_model or '' }}">
                        </div>
                    </div>
                </div>

                <div class="card mb-3">
                    <div class="card-header">
                        <h5>Service Description & Notes</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3" 
                                      placeholder="Describe the service work to be performed">{{ swo.description or '' }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Service Notes</label>
                            <textarea name="service_notes" class="form-control" rows="3" 
                                      placeholder="Additional notes or observations">{{ swo.service_notes or '' }}</textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex justify-content-between mb-4">
            <a href="{{ url_for('service_wo_routes.view_service_work_order', id=swo.id) }}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Cancel
            </a>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-circle"></i> Update Service Work Order
            </button>
        </div>
    </form>
</div>
{% endblock %}
