{% extends "base.html" %}

{% block title %}Edit Task - Dynamic.IQ.MRP{% endblock %}

{% block content %}
<div class="mb-3">
    <a href="{{ url_for('task_routes.list_tasks', wo_id=task.work_order_id) }}" class="btn btn-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back to Tasks</a>
</div>

<h2>Edit Task {{ task.task_number }}</h2>
<p class="text-muted">WO {{ task.wo_number }} - {{ task.code }} - {{ task.name }}</p>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('task_routes.edit_task', task_id=task.id) }}">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="task_name" class="form-label">Task Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="task_name" name="task_name" value="{{ task.task_name }}" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select" id="category" name="category">
                            <option value="General" {% if task.category == 'General' %}selected{% endif %}>General</option>
                            <option value="Mechanical" {% if task.category == 'Mechanical' %}selected{% endif %}>Mechanical</option>
                            <option value="Electrical" {% if task.category == 'Electrical' %}selected{% endif %}>Electrical</option>
                            <option value="Assembly" {% if task.category == 'Assembly' %}selected{% endif %}>Assembly</option>
                            <option value="Inspection" {% if task.category == 'Inspection' %}selected{% endif %}>Inspection</option>
                            <option value="Testing" {% if task.category == 'Testing' %}selected{% endif %}>Testing</option>
                            <option value="Packaging" {% if task.category == 'Packaging' %}selected{% endif %}>Packaging</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3">{{ task.description or '' }}</textarea>
            </div>

            <div class="row">
                <div class="col-md-3">
                    <div class="mb-3">
                        <label for="sequence_number" class="form-label">Sequence Number</label>
                        <input type="number" class="form-control" id="sequence_number" name="sequence_number" value="{{ task.sequence_number }}" min="0">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="mb-3">
                        <label for="priority" class="form-label">Priority</label>
                        <select class="form-select" id="priority" name="priority">
                            <option value="Low" {% if task.priority == 'Low' %}selected{% endif %}>Low</option>
                            <option value="Medium" {% if task.priority == 'Medium' %}selected{% endif %}>Medium</option>
                            <option value="High" {% if task.priority == 'High' %}selected{% endif %}>High</option>
                            <option value="Critical" {% if task.priority == 'Critical' %}selected{% endif %}>Critical</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="mb-3">
                        <label for="planned_hours" class="form-label">Planned Hours</label>
                        <input type="number" class="form-control" id="planned_hours" name="planned_hours" value="{{ task.planned_hours }}" min="0" step="0.01">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="mb-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-select" id="status" name="status">
                            <option value="Not Started" {% if task.status == 'Not Started' %}selected{% endif %}>Not Started</option>
                            <option value="In Progress" {% if task.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                            <option value="Completed" {% if task.status == 'Completed' %}selected{% endif %}>Completed</option>
                            <option value="On Hold" {% if task.status == 'On Hold' %}selected{% endif %}>On Hold</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="planned_start_date" class="form-label">Planned Start Date</label>
                        <input type="datetime-local" class="form-control" id="planned_start_date" name="planned_start_date" value="{{ (task.planned_start_date|string)[:16] if task.planned_start_date else '' }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="planned_end_date" class="form-label">Planned End Date</label>
                        <input type="datetime-local" class="form-control" id="planned_end_date" name="planned_end_date" value="{{ (task.planned_end_date|string)[:16] if task.planned_end_date else '' }}">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="assigned_resource_id" class="form-label">Assign To</label>
                        <select class="form-select" id="assigned_resource_id" name="assigned_resource_id">
                            <option value="">Unassigned</option>
                            {% for resource in labor_resources %}
                            <option value="{{ resource.id }}" {% if task.assigned_resource_id == resource.id %}selected{% endif %}>{{ resource.first_name }} {{ resource.last_name }} ({{ resource.role }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="work_center_id" class="form-label">Work Center</label>
                        <select class="form-select" id="work_center_id" name="work_center_id">
                            <option value="">-- No Work Center --</option>
                            {% for wc in work_centers %}
                            <option value="{{ wc.id }}" {% if task.work_center_id == wc.id %}selected{% endif %}>{{ wc.code }} - {{ wc.name }}</option>
                            {% endfor %}
                        </select>
                        <small class="form-text text-muted">Assign to a work center for capacity planning</small>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="task_instructions" class="form-label">Task Instructions</label>
                <textarea class="form-control" id="task_instructions" name="task_instructions" rows="3" placeholder="Detailed instructions for completing this task...">{{ task.task_instructions or '' }}</textarea>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="discrepancies" class="form-label">Discrepancies</label>
                        <textarea class="form-control" id="discrepancies" name="discrepancies" rows="3" placeholder="Any issues or discrepancies found during work...">{{ task.discrepancies or '' }}</textarea>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="corrective_actions" class="form-label">Corrective Actions</label>
                        <textarea class="form-control" id="corrective_actions" name="corrective_actions" rows="3" placeholder="Actions taken to address discrepancies...">{{ task.corrective_actions or '' }}</textarea>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="remarks" class="form-label">Remarks</label>
                <textarea class="form-control" id="remarks" name="remarks" rows="2">{{ task.remarks or '' }}</textarea>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('task_routes.list_tasks', wo_id=task.work_order_id) }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Update Task</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
