{% extends "base.html" %}

{% block title %}Create Task - Dynamic.IQ.MRP{% endblock %}

{% block content %}
<div class="mb-3">
    <a href="{{ url_for('task_routes.list_tasks', wo_id=work_order.id) }}" class="btn btn-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back to Tasks</a>
</div>

<h2>Create Task for WO {{ work_order.wo_number }}</h2>
<p class="text-muted">{{ work_order.code }} - {{ work_order.name }}</p>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('task_routes.create_task', wo_id=work_order.id) }}">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="task_name" class="form-label">Task Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="task_name" name="task_name" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select" id="category" name="category">
                            <option value="General">General</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Electrical">Electrical</option>
                            <option value="Assembly">Assembly</option>
                            <option value="Inspection">Inspection</option>
                            <option value="Testing">Testing</option>
                            <option value="Packaging">Packaging</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3"></textarea>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="sequence_number" class="form-label">Sequence Number</label>
                        <input type="number" class="form-control" id="sequence_number" name="sequence_number" value="0" min="0">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="priority" class="form-label">Priority</label>
                        <select class="form-select" id="priority" name="priority">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                            <option value="Critical">Critical</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="planned_hours" class="form-label">Planned Hours</label>
                        <input type="number" class="form-control" id="planned_hours" name="planned_hours" value="0" min="0" step="0.01">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="planned_start_date" class="form-label">Planned Start Date</label>
                        <input type="datetime-local" class="form-control" id="planned_start_date" name="planned_start_date">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="planned_end_date" class="form-label">Planned End Date</label>
                        <input type="datetime-local" class="form-control" id="planned_end_date" name="planned_end_date">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="assigned_resource_id" class="form-label">Assign To</label>
                <select class="form-select" id="assigned_resource_id" name="assigned_resource_id">
                    <option value="">Unassigned</option>
                    {% for resource in labor_resources %}
                    <option value="{{ resource.id }}">{{ resource.first_name }} {{ resource.last_name }} ({{ resource.role }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="remarks" class="form-label">Remarks</label>
                <textarea class="form-control" id="remarks" name="remarks" rows="2"></textarea>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('task_routes.list_tasks', wo_id=work_order.id) }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Create Task</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
