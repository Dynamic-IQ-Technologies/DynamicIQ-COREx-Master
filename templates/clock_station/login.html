<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Clock - Dynamic.IQ.MRP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #4a90e2 0%, #1e3a8a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .clock-container {
            background: white;
            border-radius: 20px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 95%;
            margin: 20px auto;
        }
        .clock-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .clock-logo i {
            font-size: 4rem;
            color: #4a90e2;
        }
        .clock-logo h2 {
            margin-top: 1rem;
            color: #1e3a8a;
            font-weight: 600;
        }
        .clock-logo .subtitle {
            color: #10b981;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .form-control-lg {
            height: 60px;
            font-size: 1.2rem;
            border-radius: 12px;
            text-align: center;
            letter-spacing: 2px;
        }
        .btn-clock {
            height: 60px;
            font-size: 1.2rem;
            border-radius: 12px;
            font-weight: 600;
            background: linear-gradient(135deg, #4a90e2 0%, #1e3a8a 100%);
            border: none;
            transition: transform 0.2s;
        }
        .btn-clock:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #357abd 0%, #152b5e 100%);
        }
        .current-time {
            text-align: center;
            font-size: 2.5rem;
            color: #1e3a8a;
            font-weight: 300;
            margin-bottom: 2rem;
            font-family: 'Courier New', monospace;
        }
        .current-date {
            text-align: center;
            font-size: 1rem;
            color: #64748b;
            margin-bottom: 1.5rem;
        }
        .alert {
            border-radius: 12px;
        }
        label {
            color: #475569;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        @media (max-width: 576px) {
            .clock-container {
                padding: 2rem 1.5rem;
            }
            .current-time {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="clock-container">
        <div class="clock-logo">
            <i class="bi bi-clock-fill"></i>
            <h2>Time Clock Station</h2>
            <p class="subtitle">Dynamic.IQ.MRP</p>
        </div>

        <div class="current-time" id="currentTime">--:--:--</div>
        <div class="current-date" id="currentDate">--- --, ----</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('clock_station_routes.clock_auth') }}">
            <div class="mb-3">
                <label for="employee_code" class="form-label">
                    <i class="bi bi-person-badge"></i> Employee Code
                </label>
                <input type="text" 
                       class="form-control form-control-lg" 
                       id="employee_code" 
                       name="employee_code" 
                       placeholder="ENTER CODE"
                       autocomplete="off"
                       autofocus
                       required>
            </div>

            <div class="mb-4">
                <label for="pin" class="form-label">
                    <i class="bi bi-lock-fill"></i> PIN
                </label>
                <input type="password" 
                       class="form-control form-control-lg" 
                       id="pin" 
                       name="pin" 
                       placeholder="••••"
                       autocomplete="off"
                       inputmode="numeric"
                       pattern="[0-9]*"
                       required>
            </div>

            <button type="submit" class="btn btn-primary btn-clock w-100">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{{ url_for('main_routes.dashboard') }}" class="text-muted small">
                <i class="bi bi-arrow-left"></i> Back to Main System
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false });
            const dateStr = now.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            document.getElementById('currentTime').textContent = timeStr;
            document.getElementById('currentDate').textContent = dateStr;
        }

        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
