{% extends "base.html" %}

{% block title %}Edit {{ routing.routing_code }} - Master Routing{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-pencil me-2"></i>Edit Master Routing</h2>
    <a href="{{ url_for('master_routing_routes.view_routing', id=routing.id) }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Routing Code</label>
                        <input type="text" class="form-control" value="{{ routing.routing_code }}" disabled>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Routing Name <span class="text-danger">*</span></label>
                        <input type="text" name="routing_name" class="form-control" value="{{ routing.routing_name }}" required>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="2">{{ routing.description or '' }}</textarea>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Routing Type</label>
                        <select name="routing_type" class="form-select">
                            {% for t in routing_types %}
                            <option value="{{ t }}" {% if routing.routing_type == t %}selected{% endif %}>{{ t }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Default Work Order Type</label>
                        <select name="default_work_order_type" class="form-select">
                            <option value="Production" {% if routing.default_work_order_type == 'Production' %}selected{% endif %}>Production</option>
                            <option value="Repair" {% if routing.default_work_order_type == 'Repair' %}selected{% endif %}>Repair</option>
                            <option value="Inspection" {% if routing.default_work_order_type == 'Inspection' %}selected{% endif %}>Inspection</option>
                            <option value="Prototype" {% if routing.default_work_order_type == 'Prototype' %}selected{% endif %}>Prototype</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Effective Date</label>
                        <input type="date" name="effective_date" class="form-control" value="{{ routing.effective_date or '' }}">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Linked Product</label>
                        <select name="product_id" class="form-select">
                            <option value="">-- No specific product --</option>
                            {% for p in products %}
                            <option value="{{ p.id }}" {% if routing.product_id == p.id %}selected{% endif %}>{{ p.code }} - {{ p.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Product Category</label>
                        <input type="text" name="product_category" class="form-control" value="{{ routing.product_category or '' }}">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Regulatory Basis</label>
                <input type="text" name="regulatory_basis" class="form-control" value="{{ routing.regulatory_basis or '' }}">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle me-1"></i> Save Changes
                </button>
                <a href="{{ url_for('master_routing_routes.view_routing', id=routing.id) }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
