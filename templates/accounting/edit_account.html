{% extends "base.html" %}

{% block title %}Edit Account - Dynamic.IQ.MRP{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Edit Account: {{ account.account_code }}</h2>
    <a href="{{ url_for('accounting_routes.list_accounts') }}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Account Code</label>
                <input type="text" class="form-control" value="{{ account.account_code }}" disabled>
                <small class="text-muted">Account code cannot be changed</small>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Account Type</label>
                <input type="text" class="form-control" value="{{ account.account_type }}" disabled>
                <small class="text-muted">Account type cannot be changed</small>
            </div>
            
            <div class="mb-3">
                <label for="account_name" class="form-label">Account Name *</label>
                <input type="text" class="form-control" id="account_name" name="account_name" value="{{ account.account_name }}" required>
            </div>
            
            <div class="mb-3">
                <label for="parent_account_id" class="form-label">Parent Account (Optional)</label>
                <select class="form-select" id="parent_account_id" name="parent_account_id">
                    <option value="">None (Top Level)</option>
                    {% for acc in accounts %}
                    <option value="{{ acc.id }}" {% if account.parent_account_id == acc.id %}selected{% endif %}>
                        {{ acc.account_code }} - {{ acc.account_name }}
                    </option>
                    {% endfor %}
                </select>
                <small class="text-muted">Select a parent account to create a sub-account</small>
            </div>
            
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3">{{ account.description or '' }}</textarea>
            </div>
            
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if account.is_active %}checked{% endif %}>
                <label class="form-check-label" for="is_active">Active</label>
            </div>
            
            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Update Account</button>
        </form>
    </div>
</div>
{% endblock %}
