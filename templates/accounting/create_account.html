{% extends "base.html" %}

{% block title %}Create Account - Dynamic.IQ.MRP{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Create New Account</h2>
    <a href="{{ url_for('accounting_routes.list_accounts') }}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="account_code" class="form-label">Account Code *</label>
                    <input type="text" class="form-control" id="account_code" name="account_code" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="account_name" class="form-label">Account Name *</label>
                    <input type="text" class="form-control" id="account_name" name="account_name" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="account_type" class="form-label">Account Type *</label>
                <select class="form-select" id="account_type" name="account_type" required>
                    <option value="">Select Type</option>
                    <option value="Asset">Asset</option>
                    <option value="Liability">Liability</option>
                    <option value="Equity">Equity</option>
                    <option value="Revenue">Revenue</option>
                    <option value="Expense">Expense</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label for="parent_account_id" class="form-label">Parent Account (Optional)</label>
                <select class="form-select" id="parent_account_id" name="parent_account_id">
                    <option value="">None (Top Level)</option>
                    {% for account in accounts %}
                    <option value="{{ account.id }}">{{ account.account_code }} - {{ account.account_name }}</option>
                    {% endfor %}
                </select>
                <small class="text-muted">Select a parent account to create a sub-account</small>
            </div>
            
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3"></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Create Account</button>
        </form>
    </div>
</div>
{% endblock %}
