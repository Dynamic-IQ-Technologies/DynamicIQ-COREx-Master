{% extends "base.html" %}

{% block title %}Create Supplier - Dynamic.IQ.MRP{% endblock %}

{% block content %}
<h2 class="mb-4">Create New Supplier</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="alert alert-info">
                <i class="bi bi-info-circle"></i> Supplier code will be auto-generated (e.g., SUP-000001)
            </div>
            
            <div class="mb-3">
                <label for="name" class="form-label">Supplier Name *</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="contact_person" class="form-label">Contact Person</label>
                        <input type="text" class="form-control" id="contact_person" name="contact_person">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone</label>
                        <input type="text" class="form-control" id="phone" name="phone">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="website" class="form-label">Website</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-globe"></i></span>
                    <input type="url" class="form-control" id="website" name="website" placeholder="https://www.example.com">
                </div>
            </div>

            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <textarea class="form-control" id="address" name="address" rows="3"></textarea>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('supplier_routes.list_suppliers') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Create Supplier</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
