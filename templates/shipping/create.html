{% extends "base.html" %}

{% block title %}Create Shipment - Dynamic.IQ.MRP{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-plus-circle"></i> Create New Shipment</h2>
    <a href="{{ url_for('shipping_routes.list_shipments') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Back to Shipments
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('shipping_routes.create_shipment') }}">
            <h5 class="mb-3">Shipment Details</h5>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Shipment Type <span class="text-danger">*</span></label>
                    <select class="form-select" name="shipment_type" id="shipment_type" required>
                        <option value="">Select Type</option>
                        <option value="Sales Order">Sales Order</option>
                        <option value="Work Order">Work Order</option>
                        <option value="Transfer">Transfer</option>
                    </select>
                </div>
                
                <div class="col-md-6 mb-3" id="reference_select">
                    <label class="form-label">Reference Order <span class="text-danger">*</span></label>
                    <select class="form-select" name="reference_id" id="reference_id" required>
                        <option value="">Select shipment type first</option>
                    </select>
                    <input type="hidden" name="reference_type" id="reference_type">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Carrier</label>
                    <input type="text" class="form-control" name="carrier" placeholder="e.g., FedEx, UPS">
                </div>
                
                <div class="col-md-4 mb-3">
                    <label class="form-label">Tracking Number</label>
                    <input type="text" class="form-control" name="tracking_number">
                </div>
                
                <div class="col-md-4 mb-3">
                    <label class="form-label">Shipping Method</label>
                    <select class="form-select" name="shipping_method">
                        <option value="">Select Method</option>
                        <option value="Ground">Ground</option>
                        <option value="2-Day">2-Day</option>
                        <option value="Overnight">Overnight</option>
                        <option value="Freight">Freight</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Ship Date</label>
                    <input type="date" class="form-control" name="ship_date" value="{{ today }}">
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Expected Delivery Date</label>
                    <input type="date" class="form-control" name="expected_delivery_date">
                </div>
            </div>

            <h5 class="mt-4 mb-3">Ship To Address</h5>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" name="ship_to_name">
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Address</label>
                    <input type="text" class="form-control" name="ship_to_address">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">City</label>
                    <input type="text" class="form-control" name="ship_to_city">
                </div>
                
                <div class="col-md-4 mb-3">
                    <label class="form-label">State</label>
                    <input type="text" class="form-control" name="ship_to_state">
                </div>
                
                <div class="col-md-4 mb-3">
                    <label class="form-label">Postal Code</label>
                    <input type="text" class="form-control" name="ship_to_postal_code">
                </div>
            </div>

            <h5 class="mt-4 mb-3">Package Details</h5>
            
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label">Weight</label>
                    <input type="number" step="0.01" class="form-control" name="weight">
                </div>
                
                <div class="col-md-3 mb-3">
                    <label class="form-label">Weight Unit</label>
                    <select class="form-select" name="weight_unit">
                        <option value="lbs">lbs</option>
                        <option value="kg">kg</option>
                    </select>
                </div>
                
                <div class="col-md-3 mb-3">
                    <label class="form-label">Freight Cost</label>
                    <input type="number" step="0.01" class="form-control" name="freight_cost" value="0">
                </div>
                
                <div class="col-md-3 mb-3">
                    <label class="form-label">Insurance Value</label>
                    <input type="number" step="0.01" class="form-control" name="insurance_value" value="0">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Special Instructions</label>
                <textarea class="form-control" name="special_instructions" rows="3"></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Create Shipment
                </button>
                <a href="{{ url_for('shipping_routes.list_shipments') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
// Dynamic reference selection based on shipment type
document.getElementById('shipment_type').addEventListener('change', function() {
    const type = this.value;
    const refSelect = document.getElementById('reference_id');
    const refType = document.getElementById('reference_type');
    
    refSelect.innerHTML = '<option value="">Loading...</option>';
    
    if (type === 'Sales Order') {
        refType.value = 'SalesOrder';
        refSelect.innerHTML = '<option value="">Select Sales Order</option>';
        {% for so in sales_orders %}
        refSelect.innerHTML += '<option value="{{ so.id }}">{{ so.so_number }} - {{ so.customer_name }}</option>';
        {% endfor %}
    } else if (type === 'Work Order') {
        refType.value = 'WorkOrder';
        refSelect.innerHTML = '<option value="">Select Work Order</option>';
        {% for wo in work_orders %}
        refSelect.innerHTML += '<option value="{{ wo.id }}">{{ wo.wo_number }} - {{ wo.product_name }}</option>';
        {% endfor %}
    } else {
        refType.value = '';
        refSelect.innerHTML = '<option value="">Select shipment type first</option>';
    }
});
</script>
{% endblock %}
