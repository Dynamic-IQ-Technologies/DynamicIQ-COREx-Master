{% extends "base.html" %}

{% block title %}Edit Product - Dynamic.IQ.MRP{% endblock %}

{% block content %}
<h2 class="mb-4">Edit Product</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="code" class="form-label">Product Code *</label>
                        <input type="text" class="form-control" id="code" name="code" value="{{ product.code }}" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="name" class="form-label">Product Name *</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3">{{ product.description }}</textarea>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="product_type" class="form-label">Product Type *</label>
                        <select class="form-select" id="product_type" name="product_type" required>
                            <option value="Raw Material" {% if product.product_type == "Raw Material" %}selected{% endif %}>Raw Material</option>
                            <option value="Component" {% if product.product_type == "Component" %}selected{% endif %}>Component</option>
                            <option value="Finished Good" {% if product.product_type == "Finished Good" %}selected{% endif %}>Finished Good</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="unit_of_measure" class="form-label">Unit of Measure *</label>
                        <input type="text" class="form-control" id="unit_of_measure" name="unit_of_measure" value="{{ product.unit_of_measure }}" required>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="cost" class="form-label">Unit Cost *</label>
                        <input type="number" step="0.01" class="form-control" id="cost" name="cost" value="{{ product.cost }}" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="reorder_point" class="form-label">Reorder Point</label>
                        <input type="number" step="0.01" class="form-control" id="reorder_point" name="reorder_point" value="{{ inventory.reorder_point if inventory else 0 }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="safety_stock" class="form-label">Safety Stock</label>
                        <input type="number" step="0.01" class="form-control" id="safety_stock" name="safety_stock" value="{{ inventory.safety_stock if inventory else 0 }}">
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('product_routes.list_products') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Update Product</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
