{% extends "base.html" %}

{% block title %}Create Product - Dynamic.IQ.MRP{% endblock %}

{% block content %}
<h2 class="mb-4">Create New Product</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="code" class="form-label">Product Code *</label>
                        <input type="text" class="form-control" id="code" name="code" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="name" class="form-label">Product Name *</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3"></textarea>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="product_type" class="form-label">Product Type *</label>
                        <select class="form-select" id="product_type" name="product_type" required>
                            <option value="Raw Material">Raw Material</option>
                            <option value="Component">Component</option>
                            <option value="Finished Good">Finished Good</option>
                            <option value="Tool">Tool</option>
                            <option value="Chemical">Chemical</option>
                            <option value="Equipment">Equipment</option>
                            <option value="Rotable">Rotable</option>
                            <option value="Expendable">Expendable</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="part_category" class="form-label">Part Category *</label>
                        <select class="form-select" id="part_category" name="part_category" required>
                            <option value="Electrical">Electrical</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Structural">Structural</option>
                            <option value="Other" selected>Other</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="unit_of_measure" class="form-label">Unit of Measure *</label>
                        <input type="text" class="form-control" id="unit_of_measure" name="unit_of_measure" placeholder="e.g., EA, KG, M" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="product_category" class="form-label">Product Category</label>
                        <input type="text" class="form-control" id="product_category" name="product_category" placeholder="e.g., Avionics, Engine Parts">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="manufacturer" class="form-label">Manufacturer</label>
                        <input type="text" class="form-control" id="manufacturer" name="manufacturer" placeholder="e.g., Boeing, Honeywell">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="lead_time" class="form-label">Lead Time (Days)</label>
                        <input type="number" class="form-control" id="lead_time" name="lead_time" value="0" min="0">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="reorder_point" class="form-label">Reorder Point</label>
                        <input type="number" step="0.01" class="form-control" id="reorder_point" name="reorder_point" value="0">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="safety_stock" class="form-label">Safety Stock</label>
                        <input type="number" step="0.01" class="form-control" id="safety_stock" name="safety_stock" value="0">
                    </div>
                </div>
            </div>

            <hr class="my-4">
            <h5 class="mb-3"><i class="bi bi-info-square me-2"></i>Part Information</h5>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="applicability" class="form-label">Applicability</label>
                        <input type="text" class="form-control" id="applicability" name="applicability" placeholder="e.g., Boeing 737, Airbus A320">
                        <div class="form-text">Aircraft or equipment this part applies to</div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="shelf_life_cycle" class="form-label">Shelf Life Cycle</label>
                        <input type="text" class="form-control" id="shelf_life_cycle" name="shelf_life_cycle" placeholder="e.g., 24 months, Unlimited">
                        <div class="form-text">Storage duration before expiration</div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="eccn" class="form-label">ECCN</label>
                        <input type="text" class="form-control" id="eccn" name="eccn" placeholder="e.g., EAR99, 9A991.d">
                        <div class="form-text">Export Control Classification Number</div>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="part_notes" class="form-label">Notes</label>
                <textarea class="form-control" id="part_notes" name="part_notes" rows="3" placeholder="Additional part information, special handling instructions, etc."></textarea>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('product_routes.list_products') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Create Product</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
