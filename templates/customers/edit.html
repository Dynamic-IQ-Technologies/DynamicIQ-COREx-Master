{% extends "base.html" %}
{% block title %}Edit Customer{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <h2><i class="bi bi-pencil"></i> Edit Customer - {{ customer.customer_number }}</h2>
    
    <div class="card mt-3">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Customer Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="name" value="{{ customer.name }}" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Contact Person</label>
                            <input type="text" class="form-control" name="contact_person" value="{{ customer.contact_person or '' }}">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" value="{{ customer.email or '' }}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" name="phone" value="{{ customer.phone or '' }}">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Billing Address</label>
                            <textarea class="form-control" name="billing_address" rows="3">{{ customer.billing_address or '' }}</textarea>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Shipping Address</label>
                            <textarea class="form-control" name="shipping_address" rows="3">{{ customer.shipping_address or '' }}</textarea>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label class="form-label">Payment Terms (Days)</label>
                            <input type="number" class="form-control" name="payment_terms" value="{{ customer.payment_terms }}">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label class="form-label">Credit Limit</label>
                            <input type="number" step="0.01" class="form-control" name="credit_limit" value="{{ customer.credit_limit }}">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" name="status">
                                <option value="Active" {% if customer.status == 'Active' %}selected{% endif %}>Active</option>
                                <option value="Inactive" {% if customer.status == 'Inactive' %}selected{% endif %}>Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label class="form-label">Tax Exempt</label>
                            <div class="form-check mt-2">
                                <input type="checkbox" class="form-check-input" name="tax_exempt" id="tax_exempt" {% if customer.tax_exempt %}checked{% endif %}>
                                <label class="form-check-label" for="tax_exempt">Yes</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Notes</label>
                    <textarea class="form-control" name="notes" rows="3">{{ customer.notes or '' }}</textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="{{ url_for('customer_routes.view_customer', id=customer.id) }}" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> Update Customer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
